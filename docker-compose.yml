version: '3.8'

services:
  backend:
    build: ./backend
    container_name: edgevision-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/database.db:/app/database.db
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: edgevision-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
